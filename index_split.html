<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Anniversary ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif
        }
        
        html {
            scroll-behavior: smooth
        }
        
        body {
            background: linear-gradient(135deg, #ff8fab, #ffb3c6, #ffc2d1);
            color: white;
            overflow-x: hidden;
        }
        
        .hero {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
            position: relative;
        }
        
        .hero-content {
            z-index: 2;
            animation: fadeUp 2s ease;
        }
        
        .hero h1 {
            font-size: 4rem;
            text-shadow: 0 0 20px rgba(255, 255, 255, .5);
        }
        
        .hero p {
            font-size: 1.2rem;
            margin-top: 15px;
        }
        
        .btn {
            display: inline-block;
            margin-top: 25px;
            padding: 15px 35px;
            border-radius: 40px;
            text-decoration: none;
            color: white;
            background: #ff4d6d;
            box-shadow: 0 0 25px rgba(255, 77, 109, .5);
            transition: .3s;
        }
        
        .btn:hover {
            transform: scale(1.05)
        }
        
        .section {
            padding: 80px 20px
        }
        
        .card {
            max-width: 900px;
            margin: auto;
            background: rgba(255, 255, 255, .12);
            backdrop-filter: blur(15px);
            border-radius: 25px;
            padding: 35px;
            line-height: 1.9;
            box-shadow: 0 8px 30px rgba(0, 0, 0, .2);
        }
        
        h2 {
            text-align: center;
            margin-bottom: 25px
        }
        
        .photo {
            width: 220px;
            height: 220px;
            border-radius: 50%;
            overflow: hidden;
            margin: 0 auto 25px;
            border: 6px solid white;
        }
        
        .photo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 15px;
            margin-top: 25px;
        }
        
        .gallery img {
            width: 100%;
            height: 220px;
            object-fit: cover;
            border-radius: 20px;
        }
        
        .counter,
        .countdown {
            text-align: center;
            margin-top: 20px;
            font-size: 1.3rem;
        }
        
        .letter {
            display: none;
            margin-top: 25px;
            animation: fadeUp 1s ease;
        }
        
        footer {
            text-align: center;
            padding: 40px;
            background: rgba(0, 0, 0, .15);
        }
        
        .heart {
            position: fixed;
            bottom: -20px;
            animation: float 6s linear forwards;
            z-index: 1;
        }
        
        @keyframes float {
            to {
                transform: translateY(-120vh);
                opacity: 0;
            }
        }
        
        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(30px)
            }
            to {
                opacity: 1;
                transform: translateY(0)
            }
        }
        
        @media(max-width:768px) {
            .hero h1 {
                font-size: 2.5rem
            }
        }
    </style>
</head>

<body>

    <section class="hero">
        <div class="hero-content">
            <h1>Finally 365 day! ❤️</h1>
            <p id="typing"></p>
            <a href="pesan.html" class="btn">Baca Pesan Spesial ❤️</a>
        </div>
    </section>
<script>
const texts=["Terima kasih sudah bertahan sejauh ini ❤️","I Love You ❤️","Aku Sayang Kamu ❤️","Je T'aime ❤️","Saranghae ❤️","Aishiteru ❤️"];
let t=0;function typing(){typingEl=document.getElementById("typing");typingEl.innerHTML=texts[t];t=(t+1)%texts.length;}
typing();setInterval(typing,2500);
function createHeart(){const h=document.createElement("div");h.className="heart";h.innerHTML="❤️";h.style.left=Math.random()*100+"vw";h.style.fontSize=(Math.random()*20+15)+"px";document.body.appendChild(h);setTimeout(()=>h.remove(),6000);}
setInterval(createHeart,300);
</script></body></html>
